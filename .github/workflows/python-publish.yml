<div id="chat-box" class="chat-container space-y-4 mb-4 text-sm">
        <p class="text-slate-400 italic">Siap membantu hobi, proyek, atau jadwal Anda hari ini...</p>
    </div>

    <div class="flex gap-2">
        <input id="user-input" type="text" placeholder="Tanya sesuatu..." 
               class="flex-1 p-2 rounded bg-slate-700 border-none focus:ring-2 focus:ring-blue-500 outline-none">
        <button onclick="sendMessage()" class="bg-blue-600 px-4 py-2 rounded font-bold">Kirim</button>
    </div>
</div>

<script>
    const API_KEY = "MASUKKAN_API_KEY_ANDA_DI_SINI"; 

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        if (!input.value) return;

        const userMsg = input.value;
        chatBox.innerHTML += `<div class="text-blue-400"><b>Anda:</b> ${userMsg}</div>`;
        input.value = '';

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: userMsg }] }]
                })
            });
            
            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;
            chatBox.innerHTML += `<div class="text-green-400"><b>AI:</b> ${aiResponse}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        } catch (error) {
            chatBox.innerHTML += `<div class="text-red-400 italic">Gagal terhubung ke API.</div>`;
        }
    }
</script>

name: Upload Python Package

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release distributions
        run: |
          # NOTE: put your own distribution build steps here.
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    # Dedicated environments with protections for publishing are strongly recommended.
    # For more information, see: https://docs.github.com/en/actions/deployment/targeting-different-environments/using-environments-for-deployment#deployment-protection-rules
    environment:
      name: pypi
      # OPTIONAL: uncomment and update to include your PyPI project URL in the deployment status:
      # url: https://pypi.org/p/YOURPROJECT
      #
      # ALTERNATIVE: if your GitHub Release name is the PyPI project version string
      # ALTERNATIVE: exactly, uncomment the following line instead:
      # url: https://pypi.org/project/YOURPROJECT/${{ github.event.release.name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
